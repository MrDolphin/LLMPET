<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 58px; height: 58px; margin: 0; overflow: hidden;
        background: transparent; pointer-events: none; user-select: none;
      }
      .cursor {
        position: absolute; left: 4px; top: 4px; width: 42px; height: 42px;
        filter: drop-shadow(0 3px 5px rgba(77, 35, 12, .42));
        animation: patrol-pulse .72s ease-in-out infinite alternate;
      }
      .arrow { fill: #fff8ef; stroke: #d9672f; stroke-width: 2.4; stroke-linejoin: round; }
      .paw { fill: #ed7b3b; stroke: #fff8ef; stroke-width: 1.4; }
      .ring {
        position: absolute; left: 1px; top: 1px; width: 25px; height: 25px;
        border: 2px solid rgba(237, 123, 59, .72); border-radius: 50%;
        animation: patrol-ring .8s ease-out infinite;
      }
      @keyframes patrol-pulse { to { transform: scale(.94); } }
      @keyframes patrol-ring {
        from { opacity: .8; transform: scale(.35); }
        to { opacity: 0; transform: scale(1.15); }
      }
    </style>
  </head>
  <body aria-hidden="true">
    <div class="ring"></div>
    <svg class="cursor" viewBox="0 0 42 42" aria-hidden="true">
      <path class="arrow" d="M4 3.5 6.8 30l7.1-6.4 5.7 12.8 6.1-2.8-5.8-12.5 9.3-.4z" />
      <circle class="paw" cx="29.3" cy="9.5" r="4.2" />
      <circle class="paw" cx="35.2" cy="13.4" r="2.5" />
      <circle class="paw" cx="32.7" cy="4.3" r="2.4" />
      <circle class="paw" cx="24.5" cy="4.8" r="2.3" />
    </svg>
  </body>
</html>
